name: MERN CI

on:
  push:
    branches:
      - master

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm test
      
    frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build